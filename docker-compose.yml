# =============================================================================
# llm-stack – Docker Compose
#
# Luồng:
#   Claude Code (host:20129)
#     → claude-proxy  (20129)  [model rewrite: swe.* → ka.*]
#     → omniroute     (20128)  [LLM router / load balancer]
#     → cf-ai-proxy   (20127)  [Anthropic ↔ Cloudflare CF format]
#     → Cloudflare Workers AI
#         + Redis (session/quota storage)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Redis – Session và Quota tracking cho cf-ai-proxy
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: llm-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - llm-net
    command: redis-server --appendonly yes --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # cf-ai-proxy – Chuyển đổi Anthropic ↔ Cloudflare Workers AI format
  # Tự load-balance qua nhiều CF accounts (accounts.csv)
  # Sync Neurons usage từ Cloudflare GraphQL API
  # ---------------------------------------------------------------------------
  cf-ai-proxy:
    build:
      context: ./services/cf-ai-proxy
      dockerfile: Dockerfile
    image: llm-cf-ai-proxy:latest
    container_name: llm-cf-ai-proxy
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - GIN_MODE=release
      - TZ=${TZ:-Asia/Ho_Chi_Minh}
    volumes:
      # Mount CSV files để có thể edit mà không cần rebuild
      - ./services/cf-ai-proxy/accounts.csv:/app/accounts.csv:ro
      - ./services/cf-ai-proxy/models.csv:/app/models.csv:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - llm-net
    ports:
      - "127.0.0.1:20127:20127"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:20127/health 2>/dev/null || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # omniroute – LLM Router / Load Balancer
  # Nhận request từ claude-proxy, route tới cf-ai-proxy hoặc provider khác
  # UI admin: http://localhost:20128  (đăng nhập bằng INITIAL_PASSWORD)
  # ---------------------------------------------------------------------------
  omniroute:
    image: diegosouzapw/omniroute:latest
    container_name: llm-omniroute
    restart: unless-stopped
    ports:
      - "${OMNIROUTE_PORT:-20128}:20128"          # Expose để truy cập UI admin từ host
    volumes:
      # Mount toàn bộ data dir (SQLite DB, logs, auth...)
      - ./data/omniroute:/app/data
      - ./data/logs/omniroute:/app/data/logs
      - ./data/logs/omniroute-calls:/app/data/call_logs
      - ./NIM_accounts.csv:/app/NIM_accounts.csv:ro
    environment:
      - TZ=${TZ:-Asia/Ho_Chi_Minh}
      - PORT=20128
      - HOSTNAME=0.0.0.0
      - DATA_DIR=/app/data
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - API_KEY_SECRET=${API_KEY_SECRET}
      - INITIAL_PASSWORD=${INITIAL_PASSWORD}
    depends_on:
      cf-ai-proxy:
        condition: service_started
    networks:
      - llm-net
    extra_hosts:
      # Giữ host.docker.internal để nếu cần thêm provider trỏ về host
      - "host.docker.internal:host-gateway"

  # ---------------------------------------------------------------------------
  # claude-proxy – Model name rewriter
  # Intercept Claude Code → rewrite swe.* model names → ka.* → forward to omniroute
  # Chỉ bind localhost vì Claude Code chạy trên host
  # ---------------------------------------------------------------------------
  claude-proxy:
    build:
      context: ./services/claude-proxy
      dockerfile: Dockerfile
    image: llm-claude-proxy:latest
    container_name: llm-claude-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:20129:20129"   # Chỉ bind localhost – Claude Code dùng
    environment:
      - BIND_ADDR=0.0.0.0
      - HTTP_CLIENT_TIMEOUT=120
      - REDIS_URL=redis://redis:6379
    volumes:
      # Mount config để edit không cần rebuild
      - ./services/claude-proxy/config.json:/app/config.json:ro
      - ./data/logs/claude-proxy:/app/logs
    depends_on:
      - omniroute
    networks:
      - llm-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:20129/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

# =============================================================================
networks:
  llm-net:
    driver: bridge
    name: llm-net

volumes:
  redis-data:
    name: llm-redis-data
