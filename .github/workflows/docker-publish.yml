name: Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: # Cho phép kích hoạt build thủ công từ giao diện GitHub

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (để build đa kiến trúc)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Extract metadata (tags, labels) cho cf-ai-proxy
      - name: Extract metadata for cf-ai-proxy
        id: meta-cf-ai-proxy
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/cf-ai-proxy
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Build và Push image cf-ai-proxy lên Docker Hub
      - name: Build and push cf-ai-proxy
        uses: docker/build-push-action@v6
        with:
          context: ./services/cf-ai-proxy
          file: ./services/cf-ai-proxy/Dockerfile
          push: true
          tags: ${{ steps.meta-cf-ai-proxy.outputs.tags }}
          labels: ${{ steps.meta-cf-ai-proxy.outputs.labels }}
          platforms: linux/amd64,linux/arm64 # Tự động build cho cả x86_64 và ARM64 (Apple Silicon, Raspberry Pi...)
          cache-from: type=gha # Sử dụng GitHub Actions Cache để tăng tốc build
          cache-to: type=gha,mode=max
